# Extension configuration file.
# Visit the "Extension configuration file (extension.toml)" section for more details:
# https://docs.omniverse.nvidia.com/kit/docs/kit-manual/latest/guide/extensions_advanced.html
#

[core]
reloadable = true
order = 0

[package]
version = "0.1.0"
title = "Bubblegum Sticky Pick"
description = "OmniGraph node that sticks an overlapping prim to a helper volume and releases it on command."
authors = ["Stefan Hintz"]
keywords = ["sticky", "pick", "gripper", "isaac-sim", "omnigraph"]
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"omni.graph" = {}
"omni.graph.core" = {}
"omni.graph.tools" = {}
"omni.graph.action" = {}
"omni.usd" = {}

# define the Python module that the extension provides
[[python.module]]
name = "bubblegum"

[settings]
exts."bubblegum".timeout = 5
